name: "Fluidra Blue Connect to MQTT"
version: "1.2.0"
slug: "fluidra_blueconnect_mqtt"
description: "Reads Blue Connect (Fluidra Connect) water measurements and publishes them to MQTT with Home Assistant discovery."
url: "https://github.com/qdrion/fluidra-blueconnect-mqtt"
arch:
  - aarch64
  - amd64
  - armv7
init: false
options:
  fluidra_email: ""
  fluidra_password: ""
  pool_id: "308b19be-ae03-5f98-a48a-42ed0530960d"
  device_id: "QX25002505"
  poll_interval_seconds: 7200
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_discovery_prefix: "homeassistant"
  log_level: "INFO"
schema:
  fluidra_email: str
  fluidra_password: password
  pool_id: str
  device_id: str
  poll_interval_seconds: int(60,86400)
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_discovery_prefix: str
  log_level: list(DEBUG|INFO|WARNING|ERROR)
